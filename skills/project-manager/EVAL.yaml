prompt: |
  Use the project-manager skill to respond to a realistic client/project request.
expectations:
  - "mentions durable artifact"
  - "includes verification"
  - "avoids vague next steps"
  - "includes progress update cadence or phase progress updates"
  - "delegates product, marketing, architecture, coding, devops, UI design, or QA work to specialist subagents"
  - "delegates React Native mobile app setup and implementation work to react-native-app-dev when applicable"
  - "sets up UI design tasks for each PRD before architecture or tech-spec work when the feature needs UI"
  - "writes or updates a durable UI guideline after the core PRD for new UI-bearing projects"
  - "requires UI-bearing tech specs to cite the UI guideline or feature UI brief"
  - "creates a linked follow-up QA task after implementation task completion"
  - "requires QA pass/fail reports with screenshots and bug links"
  - "triages open bugs before completing a milestone and closes invalid obsolete or wont-fix bugs with rationale"
  - "sets up a routine service status check for deployed or user-facing projects"
  - "service status check pulls product side updates and devops updates including CI status system health hosting cost user traffic and user feedback from multiple channels"
  - "sends the user a service status summary at least once per day for active live projects unless explicitly configured otherwise"
  - "creates follow-up issues for missing instrumentation missing cost visibility or unhealthy product/devops signals"
setupCommands: []
teardownCommands: []
parameters:
  fixture: evaldata/README.md
