name: no-ego-dev
version: 0.1.0
description: "NoEgoDev (NED), a Hermes profile distribution template for turning client requests into shipped products."
hermes_requires: ">=0.12.0"
author: "knoomdevbot"
license: "MIT"
distribution_owned:
  - SOUL.md
  - AGENTS.md
  - config.yaml
  - skills/
  - eval_runner/
  - evaldata/
  - README.md
env_requires:
  - name: OPENROUTER_API_KEY
    description: "Model access for Hermes if using OpenRouter."
    required: false
  - name: ANTHROPIC_API_KEY
    description: "Model access for Hermes if using Anthropic."
    required: false
